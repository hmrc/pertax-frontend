  news.enabled = true
  news.max = 10

  news.items.0.name = "hmrcApp"
  news.items.0.short-description-en= "Manage your tax and money with the HMRC app"
  news.items.0.content-en= "<p class=\"govuk-body\">More than 7 million people use the HMRC app to view and manage their tax and money in one place.</p><p class=\"govuk-body\">You can use the HMRC app to check your:</p><ul class=\"govuk-list govuk-list--bullet\"><li>tax code</li><li>Child Benefit</li><li>National Insurance number</li><li>Unique Tax Reference for Self Assessment</li><li>State Pension and fill gaps in your National Insurance record</li></ul><p class=\"govuk-body\">You can also use it to:</p><ul class=\"govuk-list govuk-list--bullet\"><li>claim a tax refund</li><li>update your name and address</li><li>make a Self Assessment payment</li></ul><h2 class=\"govuk-heading-s\">Get the app</h2><p class=\"govuk-body\">Download the HMRC app from the:</p><div class=\"govuk-grid-row\"><div class=\"govuk-grid-column-one-half govuk-grid-column-one-third-from-desktop govuk-!-padding-top-3 govuk-!-padding-bottom-3 govuk-!-padding-right-5\"><a href=\"https://apps.apple.com/gb/app/hmrc/id514561561\"><img src=\"/personal-account/assets/images/appstore-link.png\" alt=\"Link to download from App Store\" style=\"width: 99%;\"></a></div><div class=\"govuk-grid-column-one-half govuk-grid-column-one-third-from-desktop govuk-!-padding-top-3 govuk-!-padding-bottom-3 govuk-!-padding-right-5\"><a href=\"https://play.google.com/store/apps/details?id=uk.gov.hmrc.ptcalc&amp;hl=en_GB&amp;gl=US\"><img src=\"/personal-account/assets/images/googleplay-link.png\" alt=\"Link to download from Google Play\" style=\"width: 99%;\"></a></div></div>"
  news.items.0.short-description-cy= "Cadwa drefn ar dy arian a threth gydag ap CThEF"
  news.items.0.content-cy= "<p class=\"govuk-body\">Mae mwy na 7 miliwn o bobl yn defnyddio ap CThEF er mwyn bwrw golwg dros eu manylion a’u rheoli mewn un man.</p><p class=\"govuk-body\">Gallwch ddefnyddio ap CThEF er mwyn gwirio’r canlynol:</p><ul class=\"govuk-list govuk-list--bullet\"><li>eich cod treth</li><li>eich Budd-dal Plant</li><li>eich rhif Yswiriant Gwladol</li><li>eich Cyfeirnod Unigryw y Trethdalwr ar gyfer Hunanasesiad</li><li>eich Pensiwn y Wladwriaeth a llenwi bylchau yn eich cofnod Yswiriant Gwladol</li></ul><p class=\"govuk-body\">Gallwch hefyd ei ddefnyddio i wneud y canlynol:</p><ul class=\"govuk-list govuk-list--bullet\"><li>hawlio ad-daliad treth</li><li>diweddaru’ch enw neu’ch cyfeiriad</li><li>gwneud taliad Hunanasesiad</li></ul><h2 class=\"govuk-heading-s\">Cael yr ap</h2><p class=\"govuk-body\">Lawrlwythwch ap CThEF o’r canlynol:</p><div class=\"govuk-grid-row\"><div class=\"govuk-grid-column-one-half govuk-grid-column-one-third-from-desktop govuk-!-padding-top-3 govuk-!-padding-bottom-3 govuk-!-padding-right-5\"><a href=\"https://apps.apple.com/gb/app/hmrc/id514561561\"><img src=\"/personal-account/assets/images/appstore-link.png\" alt=\"Link to download from App Store\" style=\"width: 99%;\"></a></div><div class=\"govuk-grid-column-one-half govuk-grid-column-one-third-from-desktop govuk-!-padding-top-3 govuk-!-padding-bottom-3 govuk-!-padding-right-5\"><a href=\"https://play.google.com/store/apps/details?id=uk.gov.hmrc.ptcalc&amp;hl=en_GB&amp;gl=US\"><img src=\"/personal-account/assets/images/googleplay-link.png\" alt=\"Link to download from Google Play\" style=\"width: 99%;\"></a></div></div>"
  news.items.0.start-date = "2026-03-17"
  news.items.0.end-date = "2026-06-17"

  news.items.1.name = "checkYourPersonalDetails"
  news.items.1.short-description-en= "Check your personal details are up to date"
  news.items.1.content-en= "<p class=\"govuk-body\">We use your personal details to make sure you receive any payments and important correspondence from HMRC correctly and on time.</p> <p class=\"govuk-body\">If your details are not correct, this could:</p><ul class=\"govuk-list govuk-list--bullet govuk-!-margin-left-0\"><li>delay a payment, or delay a tax refund</li><li>delay important HMRC letters or notifications</li><li>cause problems during security checks</li></ul><h2 class=\"govuk-heading-s govuk-!-margin-top-0\">What you need to do</h2><p class=\"govuk-body\">Check your details and update them if anything has changed.</p>"
  news.items.1.short-description-cy= "Gwirio bod eich manylion personol yn gyfredol"
  news.items.1.content-cy= "<p class=\"govuk-body\">Rydym yn defnyddio’ch manylion personol i sicrhau eich bod yn cael taliadau a gohebiaeth bwysig gan CThEF yn gywir, ac ar amser.</p> <p class=\"govuk-body\">Os nad yw’ch manylion yn gywir, gall y canlynol ddigwydd:</p><ul class=\"govuk-list govuk-list--bullet govuk-!-margin-left-0\"><li>oedi taliad, neu oedi wrth gael ad-daliad treth</li><li>oedi llythyrau neu hysbysiadau pwysig gan CThEF</li><li>achosi problemau yn ystod gwiriadau diogelwch</li></ul><h2 class=\"govuk-heading-s govuk-!-margin-top-0\">Yr hyn y mae angen i chi ei wneud</h2><p class=\"govuk-body\">Gwirio eich manylion a’i ddiweddaru os oes unrhyw beth wedi newid.</p>"
  news.items.1.start-date = "2026-04-09"
  news.items.1.end-date = "2026-07-09"

  news.items.2.name = "homepageUpdate"
  news.items.2.short-description-en= "Changes to the personal tax account homepage"
  news.items.2.content-en= "<p class=\"govuk-body\">We’re making changes to the personal tax account homepage.</p><h2 class=\"govuk-heading-s govuk-!-margin-top-0\">What is changing</h2><p class=\"govuk-body\">The homepage is being updated to make it easier to find information and services. This will include:</p><ul class=\"govuk-list govuk-list--bullet govuk-!-margin-left-0\"><li>a new list‑based layout</li><li>clearer navigation</li><li>a simpler page structure</li></ul><h2 class=\"govuk-heading-s govuk-!-margin-top-0\">What this means for you</h2><p class=\"govuk-body\">You will still be able to access the same information and services. These changes only affect how the homepage looks and is organised.</p><h2 class=\"govuk-heading-s govuk-!-margin-top-0\">What you need to do</h2><p class=\"govuk-body\">You do not need to do anything. You can continue using your account as normal.</p>"
  news.items.2.short-description-cy= "Newidiadau i hafan y cyfrif treth personol"
  news.items.2.content-cy= "<p class=\"govuk-body\">Rydym yn gwneud newidiadau i hafan y cyfrif treth personol.</p><h2 class=\"govuk-heading-s govuk-!-margin-top-0\">Yr hyn sy’n newid</h2><p class=\"govuk-body\">Mae’r hafan yn cael ei diweddaru er mwyn ei gwneud hi’n haws i ddod o hyd i wasanaethau a gwybodaeth. Bydd hyn yn cynnwys:</p><ul class=\"govuk-list govuk-list--bullet govuk-!-margin-left-0\"><li>cynllun newydd ar ffurf rhestr</li><li>hwyluso gwe-lywio</li><li>strwythur symlach i’r dudalen</li></ul><h2 class=\"govuk-heading-s govuk-!-margin-top-0\">Beth mae hyn yn ei olygu i chi</h2><p class=\"govuk-body\">Byddwch yn dal i allu cael mynediad at yr un gwasanaethau a gwybodaeth. Bydd y newidiadau hyn dim ond yn effeithio ar ddiwyg yr hafan a sut y mae’n cael ei threfnu.</p><h2 class=\"govuk-heading-s govuk-!-margin-top-0\">Yr hyn y mae angen i chi ei wneud</h2><p class=\"govuk-body\">Nid oes angen i chi wneud dim byd. Gallwch barhau i ddefnyddio’ch cyfrif yn y ffordd arferol.</p>"
  news.items.2.start-date = "2026-04-27"
  news.items.2.end-date = "2026-07-27"
  news.items.2.pin-to-top = true

